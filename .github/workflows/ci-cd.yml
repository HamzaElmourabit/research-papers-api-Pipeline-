name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: '3.13'
  REGISTRY: ghcr.io

jobs:
  # Stage 1: Code Quality & Linting
  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality Checks
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort pylint mypy pytest pytest-cov
      
      - name: Run Black formatter check
        run: |
          black --check .
      
      - name: Run isort import checker
        run: |
          isort --check-only .
      
      - name: Run Flake8 linting
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Run mypy type checking
        run: |
          mypy . --ignore-missing-imports
        continue-on-error: true

  # Stage 2: Security Scanning
  security:
    runs-on: ubuntu-latest
    name: Security Scan
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Check for vulnerable dependencies
        run: |
          pip install safety
          safety check --json > safety-report.json
        continue-on-error: true

  # Stage 3: Unit Tests
  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    
    services:
      cassandra:
        image: cassandra:5.0
        env:
          CASSANDRA_LISTEN_ADDRESS: 127.0.0.1
        options: >-
          --health-cmd="nodetool status"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 9042:9042
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Wait for Cassandra to be ready
        run: |
          sleep 30
          python -c "
          import time
          from cassandra.cluster import Cluster
          for i in range(10):
              try:
                  cluster = Cluster(['127.0.0.1'])
                  session = cluster.connect()
                  print('Cassandra is ready!')
                  break
              except:
                  print(f'Attempt {i+1}: Cassandra not ready, waiting...')
                  time.sleep(2)
          "
      
      - name: Initialize Cassandra schema
        run: |
          python -c "
          from cassandra.cluster import Cluster
          import os
          cluster = Cluster(['127.0.0.1'])
          session = cluster.connect()
          
          # Create keyspace
          session.execute('''
            CREATE KEYSPACE IF NOT EXISTS arxiv WITH REPLICATION = {
              'class': 'SimpleStrategy',
              'replication_factor': 1
            }
          ''')
          
          # Load schema from file
          if os.path.exists('casandra/schema.cql'):
              with open('casandra/schema.cql', 'r') as f:
                  for statement in f.read().split(';'):
                      if statement.strip():
                          session.execute(statement.strip())
          "
      
      - name: Run pytest with coverage
        run: |
          pytest tests/ --cov=. --cov-report=xml --cov-report=html -v
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # Stage 4: Integration Tests
  integration-tests:
    runs-on: ubuntu-latest
    name: Integration Tests
    needs: unit-tests
    
    services:
      cassandra:
        image: cassandra:5.0
        env:
          CASSANDRA_LISTEN_ADDRESS: 127.0.0.1
        options: >-
          --health-cmd="nodetool status"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 9042:9042
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      
      - name: Wait for Cassandra
        run: sleep 30
      
      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short
      
      - name: Validate pipeline
        run: |
          python validate_pipeline.py

  # Stage 5: Build Docker image
  build:
    runs-on: ubuntu-latest
    name: Build Docker Image
    needs: [unit-tests, security]
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Stage 6: Documentation
  docs:
    runs-on: ubuntu-latest
    name: Build Documentation
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install sphinx sphinx-rtd-theme
      
      - name: Build documentation
        run: |
          cd docs
          sphinx-build -b html . _build/html
        continue-on-error: true

  # Stage 7: Status Check
  status:
    runs-on: ubuntu-latest
    name: CI Status Check
    needs: [code-quality, security, unit-tests, build]
    if: always()
    
    steps:
      - name: Check CI Status
        run: |
          if [[ "${{ needs.code-quality.result }}" == "failure" || \
                "${{ needs.security.result }}" == "failure" || \
                "${{ needs.unit-tests.result }}" == "failure" ]]; then
            echo "❌ CI Pipeline Failed"
            exit 1
          fi
          echo "✅ CI Pipeline Passed"
